name: Auto-merge Claude branches

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and merge PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Branch: $BRANCH"

          # Check if a PR already exists for this branch
          EXISTING_PR=$(gh pr list --head "$BRANCH" --base main --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -z "$EXISTING_PR" ]; then
            # Create a new PR
            PR_URL=$(gh pr create \
              --title "Auto-merge: $BRANCH" \
              --body "Automated PR to merge Claude branch \`$BRANCH\` into \`main\`." \
              --base main \
              --head "$BRANCH")
            echo "Created PR: $PR_URL"

            # Extract PR number
            PR_NUMBER=$(echo "$PR_URL" | grep -oP '\d+$')
          else
            echo "PR #$EXISTING_PR already exists"
            PR_NUMBER="$EXISTING_PR"
          fi

          # Merge the PR immediately
          gh pr merge "$PR_NUMBER" --merge --delete-branch
