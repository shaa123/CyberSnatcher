name: Auto-merge Claude branches

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Merge claude branch into main and push
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Branch: $BRANCH"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin "$BRANCH"

          # Check if there's anything to merge
          AHEAD=$(git rev-list --count HEAD..origin/"$BRANCH")
          echo "Claude branch is $AHEAD commits ahead of main"
          if [ "$AHEAD" -eq 0 ]; then
            echo "Nothing to merge."
            exit 0
          fi

          # Merge and push directly
          git merge origin/"$BRANCH" --no-edit -m "Merge $BRANCH into main"
          git push origin main
