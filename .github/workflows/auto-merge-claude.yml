name: Auto-merge Claude branches

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and merge PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Branch: $BRANCH"

          # Check if branch has any commits ahead of main
          git fetch origin main
          AHEAD=$(git rev-list --count origin/main..HEAD)
          echo "Commits ahead of main: $AHEAD"
          if [ "$AHEAD" -eq 0 ]; then
            echo "Branch is up to date with main, nothing to merge."
            exit 0
          fi

          # Close any existing open PRs for this branch first
          EXISTING_PR=$(gh pr list --head "$BRANCH" --base main --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING_PR" ]; then
            echo "Closing existing PR #$EXISTING_PR"
            gh pr close "$EXISTING_PR" 2>/dev/null || true
          fi

          # Create a fresh PR
          PR_URL=$(gh pr create \
            --title "Auto-merge: $BRANCH" \
            --body "Automated PR to merge Claude branch \`$BRANCH\` into \`main\`." \
            --base main \
            --head "$BRANCH")
          echo "Created PR: $PR_URL"
          PR_NUMBER=$(echo "$PR_URL" | grep -oP '\d+$')

          # Merge immediately
          gh pr merge "$PR_NUMBER" --merge --delete-branch || {
            echo "Merge failed, trying without branch deletion..."
            gh pr merge "$PR_NUMBER" --merge || {
              echo "Merge still failed, attempting admin merge..."
              gh pr merge "$PR_NUMBER" --merge --admin || echo "All merge attempts failed"
            }
          }
