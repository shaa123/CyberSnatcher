<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
  @font-face {
    font-family: 'Orbitron';
    src: local('Orbitron');
  }
  body { font-family: 'Orbitron', 'Segoe UI', sans-serif; user-select: none; -webkit-user-select: none; }

  /* The whole window is the crop area — bordered in red */
  #crop-frame {
    position: absolute;
    inset: 0;
    border: 3px solid #ff4444;
    border-radius: 3px;
    box-shadow: 0 0 20px #ff444466, inset 0 0 20px #ff444411;
  }

  /* Corner handles */
  .handle {
    position: absolute;
    width: 14px;
    height: 14px;
    background: #ff4444;
    border-radius: 2px;
    box-shadow: 0 0 8px #ff4444;
    z-index: 10;
  }
  .handle.nw { top: -4px; left: -4px; cursor: nw-resize; }
  .handle.ne { top: -4px; right: -4px; cursor: ne-resize; }
  .handle.sw { bottom: -4px; left: -4px; cursor: sw-resize; }
  .handle.se { bottom: -4px; right: -4px; cursor: se-resize; }

  /* Edge handles */
  .edge {
    position: absolute;
    background: #ff4444;
    border-radius: 2px;
    box-shadow: 0 0 6px #ff4444;
    z-index: 10;
  }
  .edge.n { top: -3px; left: 30%; width: 40%; height: 6px; cursor: n-resize; }
  .edge.s { bottom: -3px; left: 30%; width: 40%; height: 6px; cursor: s-resize; }
  .edge.w { left: -3px; top: 30%; width: 6px; height: 40%; cursor: w-resize; }
  .edge.e { right: -3px; top: 30%; width: 6px; height: 40%; cursor: e-resize; }

  /* Top bar with controls */
  #top-bar {
    position: absolute;
    top: 8px; left: 12px; right: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 20;
  }

  #label {
    font-size: 10px;
    color: #ff4444;
    letter-spacing: 2px;
    font-weight: 700;
  }

  .btn {
    border: none;
    border-radius: 3px;
    color: #fff;
    font-family: 'Orbitron', 'Segoe UI', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 5px 14px;
    cursor: pointer;
  }
  .btn-start { background: #ff4444; box-shadow: 0 0 10px #ff444466; }
  .btn-start:hover { background: #ff5555; }
  .btn-close { background: #666; }
  .btn-close:hover { background: #888; }

  /* Size label at bottom */
  #size-label {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: #ff6666;
    letter-spacing: 1px;
    font-weight: 700;
    background: #0a0614ee;
    padding: 3px 10px;
    border-radius: 2px;
    border: 1px solid #ff444444;
    z-index: 20;
  }

  /* Move area (center, for dragging the whole window) */
  #move-area {
    position: absolute;
    inset: 30px;
    cursor: move;
    z-index: 5;
  }
</style>
</head>
<body>
  <div id="crop-frame">
    <div class="handle nw" data-resize="nw"></div>
    <div class="handle ne" data-resize="ne"></div>
    <div class="handle sw" data-resize="sw"></div>
    <div class="handle se" data-resize="se"></div>
    <div class="edge n" data-resize="n"></div>
    <div class="edge s" data-resize="s"></div>
    <div class="edge w" data-resize="w"></div>
    <div class="edge e" data-resize="e"></div>

    <div id="top-bar">
      <span id="label">SELECT AREA</span>
      <div style="display:flex; gap:6px;">
        <button class="btn btn-start" id="btn-start">● START</button>
        <button class="btn btn-close" id="btn-close">✕ CLOSE</button>
      </div>
    </div>

    <div id="move-area"></div>
    <div id="size-label"></div>
  </div>

<script>
  // We'll use __TAURI__ internals injected by Tauri
  const { getCurrentWindow } = window.__TAURI__.window;
  const { emit } = window.__TAURI__.event;

  const win = getCurrentWindow();
  const MIN_SIZE = 100;

  let dragging = null; // { type, startX, startY, startPos, startSize }

  async function getState() {
    const pos = await win.outerPosition();
    const size = await win.outerSize();
    const sf = await win.scaleFactor();
    return { pos, size, sf };
  }

  function updateSizeLabel() {
    win.innerSize().then(size => {
      document.getElementById('size-label').textContent = size.width + ' × ' + size.height;
    });
  }
  updateSizeLabel();

  // Handle resize via edges/corners
  document.querySelectorAll('[data-resize]').forEach(el => {
    el.addEventListener('pointerdown', async (e) => {
      e.preventDefault();
      e.stopPropagation();
      el.setPointerCapture(e.pointerId);
      const { pos, size, sf } = await getState();
      dragging = {
        type: el.dataset.resize,
        startX: e.screenX,
        startY: e.screenY,
        startPos: { x: pos.x, y: pos.y },
        startSize: { w: size.width, h: size.height },
        sf
      };
    });
  });

  // Handle move via center area
  document.getElementById('move-area').addEventListener('pointerdown', async (e) => {
    e.preventDefault();
    e.stopPropagation();
    e.target.setPointerCapture(e.pointerId);
    const { pos, size, sf } = await getState();
    dragging = {
      type: 'move',
      startX: e.screenX,
      startY: e.screenY,
      startPos: { x: pos.x, y: pos.y },
      startSize: { w: size.width, h: size.height },
      sf
    };
  });

  document.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    const { type, startX, startY, startPos, startSize, sf } = dragging;
    const dx = Math.round((e.screenX - startX) * sf);
    const dy = Math.round((e.screenY - startY) * sf);

    let x = startPos.x, y = startPos.y, w = startSize.w, h = startSize.h;

    if (type === 'move') {
      x = startPos.x + dx;
      y = startPos.y + dy;
    } else {
      if (type.includes('n')) { y = startPos.y + dy; h = Math.max(MIN_SIZE, startSize.h - dy); }
      if (type.includes('s')) { h = Math.max(MIN_SIZE, startSize.h + dy); }
      if (type.includes('w')) { x = startPos.x + dx; w = Math.max(MIN_SIZE, startSize.w - dx); }
      if (type.includes('e')) { w = Math.max(MIN_SIZE, startSize.w + dx); }
    }

    // Use Tauri physical position/size
    const { PhysicalPosition, PhysicalSize } = window.__TAURI__.window;
    if (type === 'move') {
      win.setPosition(new PhysicalPosition(x, y));
    } else {
      win.setPosition(new PhysicalPosition(x, y));
      win.setSize(new PhysicalSize(w, h));
      updateSizeLabel();
    }
  });

  document.addEventListener('pointerup', () => { dragging = null; });

  // START button → emit event with the window's screen position/size, then close
  document.getElementById('btn-start').addEventListener('click', async () => {
    const pos = await win.outerPosition();
    const size = await win.outerSize();
    await emit('overlay-start-recording', { x: pos.x, y: pos.y, w: size.width, h: size.height });
    await win.close();
  });

  // CLOSE button
  document.getElementById('btn-close').addEventListener('click', async () => {
    await emit('overlay-cancelled');
    await win.close();
  });
</script>
</body>
</html>
